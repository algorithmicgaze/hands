<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hands to Hands</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #101112;
      color: #f3f0e8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      background: #101112;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
    }

    .panel {
      position: fixed;
      top: 16px;
      left: 16px;
      bottom: 16px;
      width: min(440px, calc(100vw - 32px));
      overflow: auto;
      padding: 14px;
      background: rgba(18, 20, 21, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.13);
      backdrop-filter: blur(14px);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .status {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .metric {
      padding: 8px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 6px;
      min-width: 0;
    }

    .metric span {
      display: block;
      color: #aaa69d;
      font-size: 11px;
      margin-bottom: 3px;
    }

    .metric strong {
      display: block;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    button {
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 6px;
      padding: 8px 10px;
      background: #e7d56b;
      color: #161512;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button[aria-pressed="false"] {
      background: rgba(255, 255, 255, 0.06);
      color: #f3f0e8;
    }

    .control-row, .finger-row {
      display: grid;
      grid-template-columns: 88px 1fr 76px;
      align-items: center;
      gap: 10px;
      margin: 8px 0;
    }

    label, .finger-name {
      color: #d8d3c7;
      font-size: 13px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: #e7d56b;
    }

    input[type="number"] {
      width: 76px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 6px;
      padding: 6px;
      background: rgba(0, 0, 0, 0.25);
      color: #fff;
      font: 12px ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    .hand {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid rgba(255, 255, 255, 0.11);
    }

    .hand summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      cursor: pointer;
      list-style: none;
    }

    .hand summary::-webkit-details-marker {
      display: none;
    }

    .hand-title {
      font-size: 13px;
      color: #aaa69d;
      text-transform: uppercase;
      font-weight: 700;
    }

    .dot-row {
      display: grid;
      grid-template-columns: repeat(5, 34px);
      gap: 8px;
      align-items: center;
      justify-content: end;
    }

    .summary-dot {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      color: #8d8980;
      font: 700 16px ui-monospace, SFMono-Regular, Menlo, monospace;
      font-variant-numeric: tabular-nums;
    }

    .summary-dot.on {
      background: #48d597;
      color: #07150d;
    }

    .finger-settings {
      margin-top: 8px;
    }

    .finger-name {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .bit {
      width: 22px;
      height: 22px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      color: #8d8980;
      font: 700 12px ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    .bit.on {
      background: #48d597;
      color: #07150d;
    }

    .copy-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 8px;
      margin: 8px 0 0;
      padding-top: 8px;
      border-top: 1px solid rgba(255, 255, 255, 0.11);
    }

    .copy-status {
      color: #aaa69d;
      font-size: 11px;
    }

    .copy-button {
      padding: 4px 7px;
      border-color: rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.035);
      color: #aaa69d;
      font-size: 11px;
      font-weight: 600;
    }

    .copy-button:hover {
      border-color: rgba(255, 255, 255, 0.22);
      color: #f3f0e8;
    }

    @media (max-width: 620px) {
      body { overflow: auto; }
      canvas { display: none; }
      .panel { position: static; width: auto; min-height: 100vh; }
    }
  </style>
</head>
<body>
  <script type="importmap">
    {
      "imports": {
        "three": "./third_party/three-0.161.0/build/three.module.js",
        "three/addons/": "./third_party/three-0.161.0/addons/"
      }
    }
  </script>
  <script type="module" src="render_absolute.js"></script>
</body>
</html>
